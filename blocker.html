<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Breathe</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0f;
    color: #fff;
    font-family: monospace;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .screen { display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; width:100vw; height:100vh; }
  .screen.active { display:flex; }

  /* PICK SCREEN */
  h1 { font-size:28px; letter-spacing:2px; color:rgba(255,255,255,0.6); }
  .pick-buttons { display:flex; gap:16px; }
  .pick-btn {
    padding: 20px 32px;
    font-size: 18px;
    font-family: monospace;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    color: #000;
    transition: transform 0.1s;
  }
  .pick-btn:hover { transform: scale(1.05); }
  .pick-btn.octopus { background: #3dffc0; }
  .pick-btn.turtle  { background: #38aadc; }
  .pick-btn.dog     { background: #7b9fff; }
  .sublabel { font-size:11px; opacity:0.6; display:block; margin-top:4px; font-weight:400; }

  /* BREATHE SCREEN */
  .canvas {
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 8px;
    justify-content: center;
  }
  .sprite { image-rendering: pixelated; background-repeat: no-repeat; }
  .phase-label {
    font-size: 20px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    -webkit-text-stroke: 1.5px black;
    paint-order: stroke fill;
    min-height: 28px;
  }
  .count-label {
    font-size: 72px;
    font-weight: 700;
    color: #fff;
    -webkit-text-stroke: 4px black;
    paint-order: stroke fill;
    line-height: 1;
    min-height: 80px;
  }
  .cycle-indicator { font-size:13px; color:rgba(255,255,255,0.4); letter-spacing:2px; }

  /* STRETCH SCREEN */
  .stretch-title { font-size:48px; font-weight:700; letter-spacing:2px; }
  .stretch-list { font-size:20px; line-height:2; color:rgba(255,255,255,0.75); text-align:left; }
  .stretch-list li { list-style:none; }
  .stretch-list li::before { content:"→ "; color:#ffe066; }

  /* EMERGENCY */
  .emergency-wrap { margin-top:8px; display:flex; gap:8px; align-items:center; }
  .emergency-input {
    padding: 10px 16px;
    font-size: 14px;
    font-family: monospace;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: #fff;
    outline: none;
    width: 200px;
  }
  .emergency-input::placeholder { color: rgba(255,255,255,0.25); }
  .emergency-hint { font-size:11px; color:rgba(255,255,255,0.25); }
</style>
</head>
<body>

<!-- SCREEN 1: PICK -->
<div class="screen active" id="screen-pick">
  <h1>TIME TO BREATHE</h1>
  <div class="pick-buttons">
    <button class="pick-btn octopus" onclick="startBreathing('octopus')">
      Box<span class="sublabel">4-4-4-4</span>
    </button>
    <button class="pick-btn turtle" onclick="startBreathing('turtle')">
      HRV<span class="sublabel">6-6</span>
    </button>
    <button class="pick-btn dog" onclick="startBreathing('dog')">
      4-7-8<span class="sublabel">sleep / calm</span>
    </button>
  </div>
  <div class="emergency-wrap">
    <input class="emergency-input" id="emergency-pick" placeholder="type emergency to skip" oninput="checkEmergency(this)">
  </div>
  <div class="emergency-hint">this will be logged</div>
</div>

<!-- SCREEN 2: BREATHE -->
<div class="screen" id="screen-breathe">
  <div class="cycle-indicator" id="cycle-indicator">CYCLE 1 OF 3</div>
  <div class="canvas" id="canvas">
    <div class="sprite" id="sprite"></div>
    <div class="phase-label" id="phase-label"></div>
    <div class="count-label" id="count-label"></div>
  </div>
</div>

<!-- SCREEN 3: STRETCH -->
<div class="screen" id="screen-stretch">
  <div class="stretch-title">NOW STRETCH 🧘</div>
  <ul class="stretch-list">
    <li>Roll your shoulders back x3</li>
    <li>Tilt your head side to side</li>
    <li>Stand up & shake out your hands</li>
    <li>Look 20ft away for 20 seconds</li>
  </ul>
  <div class="emergency-wrap">
    <input class="emergency-input" id="emergency-stretch" placeholder="type emergency to dismiss" oninput="checkEmergency(this)">
  </div>
  <div class="emergency-hint">or wait 30 seconds</div>
</div>

  }

let mode, phaseIdx=0, cycleCount=0, timer, frameTimer, countTimer;
const TOTAL_CYCLES = 3;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function checkEmergency(el) {
  if (el.value.toLowerCase() === 'emergency') dismiss();
}

function dismiss() {
  clearTimeout(timer); clearInterval(frameTimer); clearInterval(countTimer);
  window.close();
}

function startBreathing(m) {
  mode = m; phaseIdx = 0; cycleCount = 0;
  show('screen-breathe');
  document.getElementById('canvas').style.background = MODES[m].bg;
  runPhase();
}

function runPhase() {
  const m = MODES[mode];
  const dur = m.pattern[phaseIdx] * 1000;
  const phase = m.phases[phaseIdx];

  document.getElementById('cycle-indicator').textContent = `CYCLE ${cycleCount+1} OF ${TOTAL_CYCLES}`;
  document.getElementById('phase-label').textContent = phase;

  const s = document.getElementById('sprite');
  s.style.width = m.size + 'px';
  s.style.height = m.size + 'px';
  s.style.backgroundImage = 'url(' + m.sheet + ')';
  s.style.backgroundSize = (m.size * m.frames) + 'px ' + m.size + 'px';

  clearInterval(frameTimer); clearInterval(countTimer);

  if (dur === 0) { nextPhase(); return; }

  // countdown
  let c = m.pattern[phaseIdx];
  document.getElementById('count-label').textContent = c;
  countTimer = setInterval(() => {
    c--; document.getElementById('count-label').textContent = c > 0 ? c : '';
    if (c <= 0) clearInterval(countTimer);
  }, 1000);

  // sprite
  if (phase === 'Inhale') {
    let f = 0; setFrame(f);
    const step = dur / (m.frames - 1);
    frameTimer = setInterval(() => { f = Math.min(f+1, m.frames-1); setFrame(f); if(f>=m.frames-1) clearInterval(frameTimer); }, step);
  } else if (phase === 'Exhale') {
    let f = m.frames-1; setFrame(f);
    const step = dur / (m.frames - 1);
    frameTimer = setInterval(() => { f = Math.max(f-1,0); setFrame(f); if(f<=0) clearInterval(frameTimer); }, step);
  }

  timer = setTimeout(nextPhase, dur);
}

function nextPhase() {
  phaseIdx++;
  if (phaseIdx >= 4) {
    phaseIdx = 0;
    cycleCount++;
    if (cycleCount >= TOTAL_CYCLES) { showStretch(); return; }
  }
  runPhase();
}

function setFrame(f) {
  const m = MODES[mode];
  document.getElementById('sprite').style.backgroundPosition = `-${f * m.size}px 0px`;
}

function showStretch() {
  show('screen-stretch');
  setTimeout(dismiss, 30000);
}

// fullscreen on load
window.addEventListener('load', () => {
  if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
});
</script>
